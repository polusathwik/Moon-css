<!DOCTYPE html>
<html>
<head>
    <title>Different Moon Shapes</title>

    <style>

        body{
            background:black;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        h1{
            color:gold;
        }

        

        .box{
            border: 1px solid white;
            display: inline-block;
            text-align:center;
             width:150px;
            margin:20px;
        }

       

        .moon1,.moon2,.moon3,.moon4,.moon5,
        .moon6,.moon7,.moon8,.moon9,.moon10,
        .moon11,.moon12,.moon13,.moon14,.moon15{

            width:100px;
            height:100px;
            border-radius:50%;
            margin:auto;
            position:relative;
            overflow:hidden;
        }

        

        .moon1{
            background:white;
            box-shadow:0 0 20px white;
        }

       
        .moon2{
            background:white;
        }

        .moon2::after{
            
            position:absolute;
            width:100px;
            height:100px;
            background:black;
            border-radius:50%;
            left:30px;
        }


        .moon3{
            background:white;
        }

        .moon3::after{
            content:"" ;
            position:absolute;
            width:100px;
            height:100px;
            background:black;
            border-radius:50%;
            right:30px;
        }

       
        .moon4{
            background:linear-gradient(to right,white 50%,black 50%);
        }

        

        .moon5{
            background:linear-gradient(to right,black 50%,white 50%);
        }

        

        .moon6{
            background:white;
        }

        .moon6::after{
            content:"";
            position:absolute;
            width:60px;
            height:100px;
            background:black;
            border-radius:50%;
            right:-10px;
        }

      

        .moon7{
            background:white;
        }

        .moon7::after{
            content:"";
            position:absolute;
            width:60px;
            height:100px;
            background:black;
            border-radius:50%;
            left:-10px;
        }

       

        .moon8{
            background:black;
            border:2px solid white;
        }

       
        .moon9{
            background:white;
        }

        .moon9::after{
            content:"";
            position:absolute;
            width:20px;
            height:100px;
            background:black;
            right:-5px;
            border-radius:50%;
        }

       

        .moon10{
            background:black;
        }

        .moon10::before{
            content:"";
            position:absolute;
            width:20px;
            height:100px;
            background:white;
            right:0;
        }

        

        .moon11{
            background:white;
        }

        .moon11::after{
            content:"";
            position:absolute;
            width:100px;
            height:100px;
            background:black;
            border-radius:50%;
            left:40px;
        }

        
        .moon12{
            background:white;
        }

        .moon12::after{
            content:"";
            position:absolute;
            width:100px;
            height:100px;
            background:black;
            border-radius:50%;
            left:20px;
        }

       

        .moon13{
            width:80px;
            height:110px;
            background:white;
            border-radius:50%;
        }

        

        .moon14{
            background:transparent;
            border:5px solid white;
            box-sizing:border-box;
        }

        

        .moon15{
            background:white;
            box-shadow:0 0 20px cyan;
        }

        .moon15::after{
            content:"";
            position:absolute;
            width:100px;
            height:100px;
            background:black;
            border-radius:50%;
            left:30px;
        }

    </style>
</head>

<body>

<h1>🌙 Different Moon Shapes 🌙</h1>

<div class="container">

<div class="box">
<div class="moon1"></div>
<p>Moon 1</p>
</div>

<div class="box">
<div class="moon2"></div>
<p>Moon 2</p>
</div>

<div class="box">
<div class="moon3"></div>

</div>

<div class="box">
<div class="moon4"></div>
<p>Moon 4</p>
</div>

<div class="box">
<div class="moon5"></div>
<p>Moon 5</p>
</div>

<div class="box">
<div class="moon6"></div>
<p>Moon 6</p>
</div>

<div class="box">
<div class="moon7"></div>
<p>Moon 7</p>
</div>

<div class="box">
<div class="moon8"></div>
<p>Moon 8</p>
</div>

<div class="box">
<div class="moon9"></div>
<p>Moon 9</p>
</div>

<div class="box">
<div class="moon10"></div>
<p>Moon 10</p>
</div>

<div class="box">
<div class="moon11"></div>

</div>

<div class="box">

</div>

</div>

</div>

</div>

</body>
</html>
